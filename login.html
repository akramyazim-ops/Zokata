<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | Zokata</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#25d466", "background-light": "#f6f8f7", "background-dark": "#122017" },
                    fontFamily: { "display": ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <div
                class="size-20 bg-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-primary/5 overflow-hidden">
                <img src="/img/logo.jpg" alt="Zokata Logo" class="w-full h-full object-cover">
            </div>
            <h2 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Zokata</h2>
            <p class="text-slate-500 mt-2 font-medium">Login to your Zokata dashboard.</p>
        </div>

        <div class="premium-card p-10">
            <form class="space-y-8" id="loginForm">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email
                        Address</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
                        <input type="email" id="emailInput" placeholder="name@company.com"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl pl-14 pr-6 py-4 text-sm focus:ring-4 focus:ring-primary/10 transition-all"
                            required>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
                        <input type="password" id="passwordInput" placeholder="••••••••"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl pl-14 pr-6 py-4 text-sm focus:ring-4 focus:ring-primary/10 transition-all"
                            required>
                    </div>
                </div>

                <p id="loginError" class="hidden text-red-400 text-sm text-center py-2 px-4 bg-red-500/10 rounded-xl">
                </p>

                <button type="submit" id="loginBtn"
                    class="w-full btn-primary py-5 rounded-2xl text-base shadow-xl shadow-primary/20">
                    <span id="loginBtnText">Login Now</span>
                </button>
            </form>

            <div class="mt-10 pt-10 border-t border-slate-50 dark:border-slate-800 text-center">
                <p class="text-sm text-slate-500 font-medium">Don't have an account?
                    <a href="/signup" class="text-primary font-black hover:underline ml-1">Sign Up Free</a>
                </p>
            </div>
        </div>

        <p class="text-center text-[10px] font-bold text-slate-400 mt-10 uppercase tracking-widest">© 2024 Zokata •
            SME Malaysia</p>
    </div>
    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const errorEl = document.getElementById('loginError');

            btn.disabled = true;
            btnText.textContent = 'Logging in...';
            errorEl.classList.add('hidden');

            try {
                const client = ZokatAuth.getClient();
                const { data, error } = await client.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Sync session to auth helper
                await ZokatAuth.requireAuth();

                window.location.href = '/dashboard';
            } catch (err) {
                console.error('Login error:', err);
                errorEl.textContent = err.message || 'Login failed. Please check your credentials.';
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btnText.textContent = 'Login Now';
            }
        });
    </script>
</body>

</html>
